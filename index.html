<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office Walkabout</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>

      <button id="startButton" class="start-panel" type="button">
        <span class="start-title">Office Walkabout</span>
        <span class="start-action">Нажми, чтобы войти</span>
      </button>

      <div class="hud" aria-live="polite">
        <div class="hud-block">
          <span>Жизни</span>
          <strong id="lives">3</strong>
        </div>
        <div class="hud-block">
          <span>Здоровье</span>
          <strong id="health">100</strong>
        </div>
        <div class="hud-block">
          <span>Очки</span>
          <strong id="score">0</strong>
        </div>
        <div class="hud-block">
          <span>Попадания</span>
          <strong id="hits">0</strong>
        </div>
        <div class="hud-block">
          <span>Убито</span>
          <strong id="kills">0</strong>
        </div>
        <div class="hud-help">WASD + мышь, ЛКМ стрелять, Shift быстрее, Esc выйти</div>
      </div>

      <div class="crosshair" aria-hidden="true"></div>
      <div id="damageFlash" class="damage-flash" aria-hidden="true"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
